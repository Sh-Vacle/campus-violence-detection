# 这个文件用于记录一次常规训练配置，训练脚本本身仍以命令行参数为准。
# 需要复现实验时，优先把实际命令写进 docs/EXPERIMENT_REPORT.md。

data: data/frames
output: runs/mobilenetv2
image_size: 224
batch_train: 8
batch_val: 32
validation_split: 0.2
frozen_epochs: 10
finetune_epochs: 8
unfreeze_layers: 40
learning_rate_frozen: 0.001
learning_rate_finetune: 0.00001
seed: 42
export_tflite: true
